<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="app.css">
</head>

<body class="pantalla-auth">
    <div class="tarjeta-login fade">
        <div class="encabezado">
            <i class="bi bi-person-circle fs-1 mb-2"></i>
            <h1>Bienvenido</h1>
            <p>Inicia sesión en tu cuenta</p>
        </div>

        <form id="form-login">
            <div class="grupo-input">
                <label><i class="bi bi-envelope"></i> Correo</label>
                <input type="email" id="login-email" placeholder="correo@email.com" required>
            </div>
            <div class="grupo-input">
                <label><i class="bi bi-lock"></i> Contraseña</label>
                <input type="password" id="login-password" placeholder="********" required>
            </div>
            <button type="submit" class="boton-login w-100 border-0">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar sesión
            </button>
        </form>

        <div class="enlaces-extra">
            <p><a href="Olvidar.html"><i class="bi bi-key"></i> ¿Olvidaste tu contraseña?</a></p>
            <p>No tienes cuenta? <a href="Registro.html"><i class="bi bi-person-plus"></i> Regístrate</a></p>
        </div>
    </div>

    <footer class="footer-app">© 2026 Todos los derechos reservados</footer>

    <div class="modal fade" id="modal-cargando" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content text-center p-4">
                <div class="spinner-border text-primary mx-auto mb-2"></div>
                <p class="mb-0">Verificando datos...</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-exito" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">¡Logrado!</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center fs-5" id="mensaje-exito-texto">
                    ¡Bienvenido al sistema!
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-error" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Hubo un error</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center fs-5" id="mensaje-error-texto">
                    Datos incorrectos.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
</body>
</html>
