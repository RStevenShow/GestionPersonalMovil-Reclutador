<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión - MarkNica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="app.css">
</head>

<body class="pantalla-auth">
    <div class="tarjeta-login fade">
        <div class="encabezado">
            <i class="bi bi-person-circle fs-1 mb-2"></i>
            <h1>Bienvenido</h1>
            <p>Inicia sesión en tu cuenta</p>
        </div>

        <div id="alerta-error" class="alert alert-danger d-none p-2 small text-center mx-3 mt-3" role="alert">
            <i class="bi bi-exclamation-circle"></i> <span id="mensaje-error-texto"></span>
        </div>

        <form id="form-login" class="formulario">
            <div class="grupo-input">
                <label><i class="bi bi-envelope"></i> Correo</label>
                <input type="email" id="login-email" placeholder="correo@email.com" required>
            </div>
            <div class="grupo-input">
                <label><i class="bi bi-lock"></i> Contraseña</label>
                <input type="password" id="login-password" placeholder="********" required>
            </div>

            <button type="submit" id="btn-login" class="boton-login w-100 border-0">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar sesión
            </button>
        </form>

        <div class="enlaces-extra">
            <p><a href="Olvidar.html" class="small text-decoration-none"><i class="bi bi-key"></i> ¿Olvidaste tu contraseña?</a></p>
            <p class="small">¿No tienes cuenta? <a href="Registro.html" class="fw-bold text-decoration-none"><i class="bi bi-person-plus"></i> Regístrate</a></p>
        </div>
    </div>

    <div id="status-container" class="d-none">
        <div class="status-box">
            <div id="status-spinner" class="spinner-border text-primary"></div>
            <i id="status-check" class="bi bi-check-circle-fill text-success d-none fs-1"></i>
            <p id="status-texto" class="mt-2 mb-0 fw-bold">Verificando datos...</p>
        </div>
    </div>

    <footer class="footer-app">© 2026 Todos los derechos reservados</footer>
    <script src="auth.js"></script>
</body> 
</html>
