<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="app.css">
</head>

<body class="pantalla-auth">
    <div class="tarjeta-registro fade">
        <h1 class="text-center mb-3"><i class="bi bi-person-plus"></i> Crear cuenta</h1>

        <form id="form-registro">
            <div class="campo">
                <label>Nombre completo</label>
                <input type="text" id="reg-nombre" placeholder="Tu nombre" required>
            </div>
            <div class="campo">
                <label>Correo electrónico</label>
                <input type="email" id="reg-email" placeholder="correo@email.com" required>
            </div>
            <div class="campo">
                <label>Contraseña</label>
                <input type="password" id="reg-password" placeholder="********" required>
            </div>
            <button type="submit" class="boton-registro w-100 border-0">
                <i class="bi bi-check-circle"></i> Registrarse
            </button>
        </form>

        <hr>
        <p class="text-center">Registrarse con</p>
        <div class="redes-sociales text-center">
            <img src="assets/facebook.png" id="btn-facebook" style="width:40px; cursor:pointer" class="mx-2">
            <img src="assets/google.png" id="btn-google" style="width:40px; cursor:pointer" class="mx-2">
        </div>

        <p class="text-center mt-3">
            <a href="Login.html"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
        </p>
    </div>

    <footer class="footer-app">© 2026 Todos los derechos reservados</footer>

    <div class="modal fade" id="modal-cargando" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content text-center p-4">
                <div class="spinner-border text-primary mx-auto mb-2"></div>
                <p class="mb-0">Guardando datos...</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-exito" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-success text-white"><h5>¡Bien hecho!</h5></div>
                <div class="modal-body text-center fs-5" id="mensaje-exito-texto">Cuenta creada con éxito.</div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-error" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white"><h5>Ups...</h5></div>
                <div class="modal-body text-center fs-5" id="mensaje-error-texto">Error al registrar.</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
</body>
</html>
