<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de usuario - MarkNica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="app.css">
    <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body class="pantalla-auth">
    <div class="tarjeta-registro fade">
        <h1 class="text-center mb-3"><i class="bi bi-person-plus"></i> Crear cuenta</h1>

        <div id="alerta-error" class="alert alert-danger d-none p-2 small text-center mb-3" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span id="mensaje-error-texto"></span>
        </div>

        <form id="form-registro">
            <div class="campo">
                <label>Nombre completo</label>
                <input type="text" id="reg-nombre" placeholder="Tu nombre" required>
            </div>
            <div class="campo">
                <label>Correo electrónico</label>
                <input type="email" id="reg-email" placeholder="correo@email.com" required>
            </div>
            <div class="campo">
                <label>Contraseña</label>
                <input type="password" id="reg-password" placeholder="********" required>
            </div>

            <button type="submit" id="btn-registro" class="boton-registro w-100 border-0">
                Registrarse
            </button>
        </form>

        <hr>
        <p class="text-center small text-muted">Registrarse con</p>
        <div class="redes-sociales text-center">
            <img src="assets/facebook.png" id="btn-facebook" style="width:35px; cursor:pointer" class="mx-2">
            <img src="assets/google.png" id="btn-google" style="width:35px; cursor:pointer" class="mx-2">
        </div>

        <p class="text-center mt-3">
            <a href="Login.html" class="text-decoration-none small"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
        </p>
    </div>

    <div id="status-container" class="d-none">
        <div class="status-box">
            <div id="status-spinner" class="spinner-border text-primary"></div>
            <i id="status-check" class="bi bi-check-circle-fill text-success d-none fs-1"></i>
            <p id="status-texto" class="mt-2 mb-0 fw-bold">Guardando datos...</p>
        </div>
    </div>

    <footer class="footer-app">© 2026 Todos los derechos reservados</footer>
    <script src="auth.js"></script>
</body>
</html>
