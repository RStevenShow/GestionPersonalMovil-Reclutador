<html lang="es">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="app.css">
</head>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">


    <!-- CHART -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


    <link rel="stylesheet" href="app.css">
</head>
<nav class="barra-inferior-pro">

        <a href="menu.html" class="link-menu activo">

            <i class="bi bi-house"></i>

            <span>Inicio</span>

        </a>


        <a href="vacantes.html" class="link-menu">

            <i class="bi bi-briefcase"></i>

            <span>Vacantes</span>

        </a>


        <a href="mensaje.html" class="link-menu">

            <i class="bi bi-chat"></i>

            <span>Mensajes</span>

        </a>


        <a href="agenda.html" class="link-menu">

            <i class="bi bi-calendar"></i>

            <span>Agenda</span>

        </a>


        <a href="perfil.html" class="link-menu">

            <i class="bi bi-person"></i>

            <span>Perfil</span>

        </a>

    </nav>
<body>

<div class="agenda-container">

    <!-- HEADER -->
    <div class="agenda-header">
        <h1>Agenda de Entrevistas</h1>
        <p>Viernes, 13 de Marzo 2026</p>

        <div class="agenda-box">
            <span>Hoy tienes</span>
            <h2>3 Entrevistas</h2>
        </div>
    </div>

    <!-- TABS -->
    <div class="agenda-tabs">
    <button class="tab-btn active" onclick="cambiarTab('hoy', this)">Hoy</button>
    <button class="tab-btn" onclick="cambiarTab('proximas', this)">Próximas</button>
    <button class="tab-btn" onclick="cambiarTab('completadas', this)">Completadas</button>
</div>

    <!-- CONTENIDO DE TABS -->
    <div id="hoy" class="tab-content" style="display: block;">
<!-- PROXIMAS -->
<div id="proximas" class="tab-content" style="display:none;">
    <p style="padding:1rem;">No hay entrevistas próximas</p>
</div>

<!-- COMPLETADAS -->
<div id="completadas" class="tab-content" style="display:none;">
    <p style="padding:1rem;">No hay entrevistas completadas</p>
</div>
</div>

    <!-- CARD 1 -->
    <a href="detalle.html" class="agenda-card">

    <div class="agenda-time">
        <h3>15</h3>
        <span>00</span>
    </div>

    <div class="agenda-info">
        <h4>Ana García López</h4>
        <p>Frontend Developer</p>
    </div>

    <div class="agenda-status match">
        92% Match
    </div>


    <!-- CARD 2 -->
    <div class="agenda-card">
        <div class="agenda-time">
            <h3>11</h3>
            <span>00</span>
        </div>

        <div class="agenda-info">
            <h4>José Luis Pérez</h4>
            <p>DevOps Engineer</p>
            <span class="agenda-tag"> Presencial</span>
        </div>

        <div class="agenda-status match">90% Match</div>
    </div>

    <!-- BOTON -->
    <button class="agenda-fab">+</button>

</div>

<script>
function cambiarTab(tabId, boton){

    // ocultar todos los contenidos
    let tabs = document.querySelectorAll('.tab-content');
    tabs.forEach(t => t.style.display = "none");

    // mostrar el seleccionado
    document.getElementById(tabId).style.display = "block";

    // quitar active
    let botones = document.querySelectorAll('.tab-btn');
    botones.forEach(b => b.classList.remove("active"));

    // activar el clickeado
    boton.classList.add("active");
}
</script>
</body>
</html>
