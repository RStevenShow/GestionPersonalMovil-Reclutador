<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Agenda - MarkNica AI</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="app.css" />
    <link rel="manifest" href="manifest.json" />

    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
  </head>
  <body class="pantalla-menu bg-light">
    <div class="agenda-container pb-5 mb-5">
      <div class="header-gradient shadow-sm mb-4 position-relative">
        <div class="d-flex justify-content-between align-items-start mb-4">
          <div>
            <h1 class="h2 fw-bold mb-1">Agenda</h1>
            <p id="fecha-actual" class="mb-0 opacity-75 small">
              Cargando fecha...
            </p>
          </div>
          <i class="bi bi-calendar2-check fs-1 opacity-75"></i>
        </div>

        <div class="d-flex gap-2">
          <div class="stat-box-glass">
            <h3 id="stat-hoy">0</h3>
            <span>Hoy</span>
          </div>
          <div class="stat-box-glass">
            <h3 id="stat-proximas">0</h3>
            <span>Próximas</span>
          </div>
          <div class="stat-box-glass">
            <h3 id="stat-pasadas">0</h3>
            <span>Pasadas</span>
          </div>
        </div>
      </div>

      <div class="px-3">
        <div
          class="agenda-tabs d-flex justify-content-between bg-white rounded-pill p-1 shadow-sm mb-4"
        >
          <button
            class="tab-btn active flex-grow-1 border-0 rounded-pill py-2 fw-bold text-muted bg-transparent"
            onclick="cambiarTab('hoy', this)"
          >
            Hoy
          </button>
          <button
            class="tab-btn flex-grow-1 border-0 rounded-pill py-2 fw-bold text-muted bg-transparent"
            onclick="cambiarTab('proximas', this)"
          >
            Próximas
          </button>
          <button
            class="tab-btn flex-grow-1 border-0 rounded-pill py-2 fw-bold text-muted bg-transparent"
            onclick="cambiarTab('pasadas', this)"
          >
            Pasadas
          </button>
        </div>

        <div id="hoy" class="tab-content" style="display: block">
          <div class="text-center text-muted p-4 small" id="loader-hoy">
            <div
              class="spinner-border text-primary spinner-border-sm me-2"
              role="status"
            ></div>
            Cargando agenda...
          </div>
        </div>

        <div id="proximas" class="tab-content" style="display: none"></div>

        <div id="pasadas" class="tab-content" style="display: none"></div>
      </div>
    </div>

    <nav class="barra-inferior-pro">
      <a href="menu.html" class="link-menu"
        ><i class="bi bi-house"></i><span>Inicio</span></a
      >
      <a href="vacantes.html" class="link-menu"
        ><i class="bi bi-briefcase"></i><span>Vacantes</span></a
      >
      <a href="agenda.html" class="link-menu activo"
        ><i class="bi bi-calendar"></i><span>Agenda</span></a
      >
      <a href="perfil.html" class="link-menu"
        ><i class="bi bi-person"></i><span>Perfil</span></a
      >
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
            const API_BASE_URL = "https://reclutamiento-backend.onrender.com";
            const token = localStorage.getItem("token");

            // Función para asegurar que el reclutador esté suscrito al abrir su agenda para las notifiaciones
            async function verificarEstadoSuscripcion() {
              if ("serviceWorker" in navigator && "PushManager" in window) {
                const registration = await navigator.serviceWorker.ready;
                const subscription = await registration.pushManager.getSubscription();

                if (!subscription) {
                  console.log(
                    "SISTEMA: El usuario no tiene suscripcion activa. Solicitando...",
                  );
                  // Aquí puedes llamar a tu función existente de suscribirUsuario()
                } else {
                  // Enviamos la suscripción actual al backend por si cambió o para refrescar el ID
                  await actualizarSuscripcionEnServidor(subscription);
                }
              }
            }

            async function actualizarSuscripcionEnServidor(subscription) {
              try {
                await fetch(`${API_BASE_URL}/api/save-subscription`, {
                  method: "POST",
                  headers: {
                    Authorization: `Bearer ${token}`,
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify(subscription),
                });
                console.log("SISTEMA: Identificador de notificaciones sincronizado.");
              } catch (error) {
                console.error("ERROR: No se pudo sincronizar la suscripcion:", error);
              }
            }

            document.addEventListener("DOMContentLoaded", () => {
              if (!token) {
                window.location.href = "Login.html";
                return;
              }
              configurarFechaHeader();
              obtenerAgenda();
              verificarEstadoSuscripcion();
            });

            function cambiarTab(tabId, boton) {
              document
                .querySelectorAll(".tab-content")
                .forEach((t) => (t.style.display = "none"));
              document.getElementById(tabId).style.display = "block";
              document.querySelectorAll(".tab-btn").forEach((b) => {
                b.classList.remove("active", "bg-primary", "text-white");
                b.classList.add("text-muted", "bg-transparent");
              });
              boton.classList.add("active", "bg-primary", "text-white");
              boton.classList.remove("text-muted", "bg-transparent");
            }

            function configurarFechaHeader() {
              const opciones = { weekday: "long", day: "numeric", month: "long" };
              const fechaTexto = new Date().toLocaleDateString("es-NI", opciones);
              document.getElementById("fecha-actual").innerText =
                fechaTexto.charAt(0).toUpperCase() + fechaTexto.slice(1);
            }

            async function obtenerAgenda() {
              try {
                const response = await fetch(`${API_BASE_URL}/interviews/`, {
                  headers: {
                    Authorization: `Bearer ${token}`,
                    "Content-Type": "application/json",
                  },
                });

                if (response.status === 401) {
                  localStorage.removeItem("token");
                  window.location.href = "Login.html";
                  return;
                }

                if (!response.ok) throw new Error("Error obteniendo entrevistas");

                const entrevistas = await response.json();
                procesarEntrevistas(entrevistas);
              } catch (error) {
                console.error("Error:", error);
                document.getElementById("hoy").innerHTML =
                  `<p class="text-center text-danger p-4 small">Error de conexión. Reintenta en unos segundos.</p>`;
              }
            }

            function procesarEntrevistas(entrevistas) {
              const containerHoy = document.getElementById("hoy");
              const containerProximas = document.getElementById("proximas");
              const containerPasadas = document.getElementById("pasadas");

              containerHoy.innerHTML = "";
              containerProximas.innerHTML = "";
              containerPasadas.innerHTML = "";

              const hoyDate = new Date();
              const hoyStr = new Date(
                hoyDate.getTime() - hoyDate.getTimezoneOffset() * 60000,
              )
                .toISOString()
                .split("T")[0];

              let contadorHoy = 0;
              let contadorProximas = 0;
              let contadorPasadas = 0;

              entrevistas.sort((a, b) => {
                if (a.fecha === b.fecha) return a.hora.localeCompare(b.hora);
                return a.fecha.localeCompare(b.fecha);
              });

              entrevistas.forEach((ent) => {
                const tarjetaHtml = generarHTMLTarjeta(ent);

                if (ent.fecha === hoyStr) {
                  containerHoy.innerHTML += tarjetaHtml;
                  contadorHoy++;
                } else if (ent.fecha > hoyStr) {
                  containerProximas.innerHTML += tarjetaHtml;
                  contadorProximas++;
                } else {
                  containerPasadas.innerHTML += tarjetaHtml;
                  contadorPasadas++;
                }
              });

              // Actualizar los 3 cuadros de cristal
              document.getElementById("stat-hoy").innerText = contadorHoy;
              document.getElementById("stat-proximas").innerText = contadorProximas;
              document.getElementById("stat-pasadas").innerText = contadorPasadas;

              // Mensajes vacíos
              if (containerHoy.innerHTML === "")
                containerHoy.innerHTML =
                  '<p class="text-center text-muted p-5 small">Día libre. No tienes entrevistas hoy.</p>';
              if (containerProximas.innerHTML === "")
                containerProximas.innerHTML =
                  '<p class="text-center text-muted p-5 small">No hay entrevistas agendadas a futuro.</p>';
              if (containerPasadas.innerHTML === "")
                containerPasadas.innerHTML =
                  '<p class="text-center text-muted p-5 small">No hay historial de entrevistas.</p>';

              const btnHoy = document.querySelector(".tab-btn.active");
              if (btnHoy) cambiarTab("hoy", btnHoy);
            }

        function generarHTMLTarjeta(entrevista) {
          const horaArray = entrevista.hora.split(":");
          const horas = horaArray[0];
          const minutos = horaArray[1] || "00";

          // Detectar estado
          const esCompletada = entrevista.completada === true;

          const hoyDate = new Date();
          const hoyStr = new Date(hoyDate.getTime() - hoyDate.getTimezoneOffset() * 60000)
              .toISOString()
              .split("T")[0];
          const esHoy = entrevista.fecha === hoyStr;

          let iconoMetodo = "bi-camera-video";
          if (entrevista.metodo.toLowerCase().includes("presencial")) iconoMetodo = "bi-person-badge";
          if (entrevista.metodo.toLowerCase().includes("tel")) iconoMetodo = "bi-telephone";

          // --- Lógica de Bloqueo ---
          // Si está completada, no hay redirección (void). Si no, va a la sala.
          const destino = esCompletada ? "return false;" : `window.location.href='sala_entrevista.html?id=${entrevista.id}'`;

          // Clase CSS adicional si está completada
          const claseBloqueo = esCompletada ? "entrevista-finalizada" : "";

          return `
          <div class="agenda-card bg-white rounded-4 shadow-sm mb-3 p-3 d-flex align-items-center ${claseBloqueo}"
               onclick="${destino}"
               style="cursor: ${esCompletada ? 'default' : 'pointer'}; border-left: ${esHoy && !esCompletada ? "4px solid #4f46e5" : "4px solid transparent"};">

              <div class="agenda-time text-center pe-3 me-3 border-end border-2 border-light" style="min-width: 60px;">
                  <h3 class="mb-0 fw-bold ${esHoy && !esCompletada ? "text-primary" : "text-secondary"}" style="font-size: 1.8rem; line-height: 1;">${horas}</h3>
                  <span class="text-muted d-block fw-bold" style="font-size: 0.9rem;">${minutos}</span>
              </div>

              <div class="agenda-info flex-grow-1 overflow-hidden">
                  <h6 class="mb-1 fw-bold text-dark text-truncate">${entrevista.nombre || "Candidato"}</h6>
                  <p class="mb-2 text-secondary small text-truncate" style="font-size: 0.8rem;">${entrevista.puesto || "Vacante"}</p>
                  <div class="d-flex gap-2 align-items-center">
                      <span class="badge bg-light text-primary border border-primary-subtle py-1 px-2 fw-medium">
                          <i class="bi ${iconoMetodo} me-1"></i> ${entrevista.metodo}
                      </span>
                      ${esCompletada
                          ? `<span class="badge bg-success text-white py-1 px-2 fw-bold" style="font-size: 0.7rem;">CALIFICADO: ${entrevista.calificacion}</span>`
                          : (esHoy ? '<span class="badge bg-success-subtle text-success border border-success-subtle py-1 px-2 fw-bold" style="font-size: 0.7rem;">LISTO</span>' : "")
                      }
                  </div>
              </div>

              <div class="agenda-status text-end ms-2 d-flex flex-column align-items-end justify-content-center">
                  <div class="badge bg-primary bg-opacity-10 text-primary border border-primary-subtle rounded-pill py-1 px-2 fw-bold shadow-sm mb-1">
                      ${entrevista.match ? Math.round(entrevista.match) : 0}%
                  </div>
                  <div class="small fw-bold text-muted" style="font-size: 0.75rem;">
                      ${entrevista.fecha.split("-")[2]}/${entrevista.fecha.split("-")[1]}
                  </div>
              </div>
          </div>
          `;
      }

            function renderizarEntrevistas(entrevistas) {
              const contenedor = document.getElementById("contenedor-entrevistas");
              contenedor.innerHTML = entrevistas
                .map((ent) => {
                  const esCompletada = ent.completada === true;

                  return `
                  <div class="card-entrevista ${esCompletada ? "entrevista-finalizada" : ""} mb-3 p-3">
                      <div class="d-flex justify-content-between align-items-start">
                          <div>
                              <h6 class="fw-bold mb-1">${ent.candidato_nombre}</h6>
                              <small class="text-muted"><i class="bi bi-clock me-1"></i> ${ent.hora}</small>
                          </div>
                          ${
                            esCompletada
                              ? `<span class="badge bg-success-subtle text-success rounded-pill px-3">Nota: ${ent.calificacion}/100</span>`
                              : `<span class="badge bg-primary-subtle text-primary rounded-pill px-3">Pendiente</span>`
                          }
                      </div>

                      <div class="mt-3 d-flex gap-2">
                          ${
                            esCompletada
                              ? `<button class="btn btn-light w-100 rounded-pill border" disabled>
                                   <i class="bi bi-check2-all me-2"></i>Entrevista Realizada
                                 </button>`
                              : `<a href="sala_entrevista.html?id=${ent.id}" class="btn btn-primary w-100 rounded-pill">
                                   <i class="bi bi-camera-video me-2"></i>Iniciar ahora
                                 </a>`
                          }
                      </div>
                  </div>
              `;
                })
                .join("");
            }
    </script>
  </body>
</html>
