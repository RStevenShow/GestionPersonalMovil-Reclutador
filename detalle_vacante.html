<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranking IA - MarkNica</title>
    <!-- Bootstrap para componentes base -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Iconos oficiales de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Tus estilos personalizados -->
    <link rel="stylesheet" href="app.css">
</head>
<body class="pantalla-menu">

    <!-- ENCABEZADO: Reutiliza tu degradado de Inicio/Perfil -->
    <header class="encabezado-menu shadow-sm">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <!-- Botón para retroceder a la lista de vacantes -->
                <a href="vacantes.html" class="text-white"><i class="bi bi-chevron-left fs-4"></i></a>
                <h4 class="mb-0">Ranking de IA</h4>
                <i class="bi bi-shield-check"></i>
            </div>
            
            <!-- CAJA DE INFO: Muestra los datos de la vacante actual -->
            <div class="agenda-box mt-3 text-white" id="info-vacante">
                <div class="text-center py-2">
                    <div class="spinner-border spinner-border-sm text-light"></div>
                    <small class="ms-2">Sincronizando con el servidor...</small>
                </div>
            </div>
        </div>
    </header>

    <!-- LISTADO DE CANDIDATOS -->
    <main class="container mt-4 fade"> <!-- Tu animación fade de app.css -->
        <div class="d-flex align-items-center mb-3 px-1">
            <h5 class="fw-bold mb-0">Postulantes analizados</h5>
            <!-- Contador circular dinámico -->
            <span class="ms-auto badge bg-primary rounded-pill" id="total-cands">0</span>
        </div>

        <!-- CONTENEDOR DE RANKING: Aquí JS inyectará las tarjetas -->
        <div id="lista-ranking" class="vstack gap-2">
            <!-- Se llena dinámicamente -->
        </div>
    </main>

    <!-- NAVBAR INFERIOR: Se mantiene fija como en el resto de la App -->
    <nav class="barra-inferior-pro">
        <a href="menu.html" class="link-menu"><i class="bi bi-house"></i><span>Inicio</span></a>
        <a href="vacantes.html" class="link-menu activo"><i class="bi bi-briefcase"></i><span>Vacantes</span></a>
        <a href="agenda.html" class="link-menu"><i class="bi bi-calendar"></i><span>Agenda</span></a>
        <a href="perfil.html" class="link-menu"><i class="bi bi-person"></i><span>Perfil</span></a>
    </nav>

    <script src="detalle_vacante.js"></script>
</body>
</html>
