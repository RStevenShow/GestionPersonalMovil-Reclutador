<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modo Entrevista</title>
<link rel="stylesheet" href="app.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
<nav class="barra-inferior-pro">

        <a href="menu.html" class="link-menu activo">

            <i class="bi bi-house"></i>

            <span>Inicio</span>

        </a>


        <a href="vacantes.html" class="link-menu">

            <i class="bi bi-briefcase"></i>

            <span>Vacantes</span>

        </a>


        <a href="agenda.html" class="link-menu">

            <i class="bi bi-calendar"></i>

            <span>Agenda</span>

        </a>


        <a href="perfil.html" class="link-menu">

            <i class="bi bi-person"></i>

            <span>Perfil</span>

        </a>

    </nav>
<<div class="app">

    <!-- HEADER -->
    <div class="header">
        <h2 onclick="history.back()">
            ← Modo Entrevista
        </h2>
    </div>

    <!-- VIDEO -->
    <div class="video-container">
    <video id="video" autoplay></video>
</div>

<!-- BOTONES -->
<div class="controles-llamada">

    <button class="btn-iniciar" onclick="iniciarLlamada()">
        Iniciar Llamada
    </button>

    <button class="btn-finalizar" onclick="finalizarLlamada()">
        Finalizar Llamada
    </button>

</div>


    <!-- CALIFICACION -->
    <div class="card">
        <h4>Calificación General</h4>

        <div class="stars">
            <span onclick="calificar(1)">★</span>
            <span onclick="calificar(2)">★</span>
            <span onclick="calificar(3)">★</span>
            <span onclick="calificar(4)">★</span>
            <span onclick="calificar(5)">★</span>
        </div>

        <p id="texto">Selecciona una calificación</p>
    </div>

</div>

    <!-- CALIFICACION -->
    <div class="card">
        <h4>Calificación General</h4>

        <div class="stars">
            <i class="bi bi-star" onclick="calificar(1)"></i>
            <i class="bi bi-star" onclick="calificar(2)"></i>
            <i class="bi bi-star" onclick="calificar(3)"></i>
            <i class="bi bi-star" onclick="calificar(4)"></i>
            <i class="bi bi-star" onclick="calificar(5)"></i>
        </div>

        <p id="texto">Selecciona una calificación</p>
    </div>
<!-- HABILIDADES -->
<div class="card">
    <h4>Etiquetas de Habilidades</h4>

    <div class="tags">
        <span>Comunicación</span>
        <span>Técnico</span>
        <span>Liderazgo</span>
        <span>Trabajo en equipo</span>
        <span>Resolución de problemas</span>
        <span>Creatividad</span>
    </div>
</div>
    <!-- NOTAS -->
    <div class="card">
        <h4>Notas</h4>
        <textarea placeholder="Escribe aquí..."></textarea>
    </div>

    <button class="btn-final">Completar Entrevista</button>

</div>

<script>
function calificar(num){
    let estrellas = document.querySelectorAll('.stars i');

    estrellas.forEach((e, i)=>{
        if(i < num){
            e.classList.add('activa');
        }else{
            e.classList.remove('activa');
        }
    });

    document.getElementById("texto").innerText =
        "Calificación: " + num + " estrellas";
}
</script>

<script>
let stream = null;

/* INICIAR LLAMADA */
async function iniciarLlamada(){
    try{
        stream = await navigator.mediaDevices.getUserMedia({
            video:true,
            audio:true
        });

        document.getElementById("videoLocal").srcObject = stream;

    }catch(e){
        alert("No se pudo iniciar la cámara");
        console.error(e);
    }
}

/* FINALIZAR LLAMADA */
function finalizarLlamada(){

    if(stream){
        stream.getTracks().forEach(track => track.stop());
    }

    document.getElementById("videoLocal").srcObject = null;

    alert("Llamada finalizada");
}
</script>
</body>

</html>
