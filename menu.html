<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú principal - MarkNica</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="app.css">
</head>

<body class="pantalla-menu">

    <header class="encabezado-menu">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <h4>
                    <i class="bi bi-cpu-fill me-2"></i>
                    <span id="nombreApp">MarkNica AI</span>
                </h4>
                <button onclick="cerrarSesion()" class="btn btn-sm btn-outline-light border-0">
                    <i class="bi bi-box-arrow-right fs-4"></i>
                </button>
            </div>

            <div class="row mt-3 text-center">
                <div class="col-4">
                    <div class="estadistica">
                        <span id="datoCandidatos">--</span>
                        <br>
                        <small>Candidatos</small>
                    </div>
                </div>
                <div class="col-4">
                    <div class="estadistica">
                        <span id="datoEntrevistas">--</span>
                        <br>
                        <small>Entrevistas</small>
                    </div>
                </div>
                <div class="col-4">
                    <div class="estadistica">
                        <span id="datoMatch">--%</span>
                        <br>
                        <small>Match IA</small>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mt-4 fade-in">
        <h5 id="tituloAcciones" class="fw-bold mb-3">Acciones inmediatas</h5>

        <div id="contenedor-acciones">
            <div id="accion1" class="tarjeta-accion prioridad-alta p-3 mb-3 shadow-sm d-flex align-items-center">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                Sincronizando con la nube...
            </div>
            <div id="accion2" class="tarjeta-accion prioridad-media p-3 mb-3 shadow-sm d-flex align-items-center">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                Verificando vacantes...
            </div>
        </div>

        <div class="card mt-4 border-0 shadow-sm" style="border-radius: 1.2rem;">
            <div class="card-body">
                <h5 class="fw-bold mb-3">Estado del proceso</h5>
                <div style="position: relative; height:250px;">
                    <canvas id="graficoProceso"></canvas>
                </div>
            </div>
        </div>
    </main>

    <nav class="barra-inferior-pro">
        <a href="menu.html" class="link-menu activo">
            <i class="bi bi-house-door-fill"></i>
            <span>Inicio</span>
        </a>
        <a href="vacantes.html" class="link-menu">
            <i class="bi bi-briefcase"></i>
            <span>Vacantes</span>
        </a>
        <a href="agenda.html" class="link-menu">
            <i class="bi bi-calendar-event"></i>
            <span>Agenda</span>
        </a>
        <a href="perfil.html" class="link-menu">
            <i class="bi bi-person-circle"></i>
            <span>Perfil</span>
        </a>
    </nav>

    <script>
        // URL DE TU BACKEND EN RENDER
        const API_BASE_URL = "https://reclutamiento-backend.onrender.com";
        const token = localStorage.getItem('token');
        let graficoReferencia = null;

        // 1. Proteger la ruta: Si no hay token, fuera.
        if (!token) {
            window.location.href = "Login.html";
        }

        // 2. Al cargar la página, pedir datos al servidor
        document.addEventListener('DOMContentLoaded', () => {
            obtenerDatosDashboard();
            marcarEnlaceActivo();
        });

        async function obtenerDatosDashboard() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/dashboard-stats`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.status === 401) {
                    cerrarSesion();
                    return;
                }

                if (!response.ok) throw new Error("Error en la respuesta del servidor");

                const data = await response.json();
                renderizarPantalla(data);

            } catch (error) {
                console.error("Error:", error);
                document.getElementById("nombreApp").textContent = "Sin Conexión";
                document.getElementById("accion1").innerHTML = `<i class="bi bi-wifi-off me-2"></i> El servidor está despertando...`;
                document.getElementById("accion2").innerHTML = `<i class="bi bi-arrow-clockwise me-2"></i> Reintentando en breve.`;
                
                // Reintento automático a los 5 segundos si falla (útil para el Cold Start de Render)
                setTimeout(obtenerDatosDashboard, 5000);
            }
        }

        function renderizarPantalla(data) {
            // Actualizar Textos
            document.getElementById("nombreApp").textContent = data.appNombre || "MarkNica AI";
            document.getElementById("datoCandidatos").textContent = data.candidatos || "0";
            document.getElementById("datoEntrevistas").textContent = data.entrevistas || "0";
            document.getElementById("datoMatch").textContent = (data.match || "0") + "%";

            // Actualizar Tarjetas de Acción
            if (data.acciones && data.acciones.length >= 2) {
                document.getElementById("accion1").innerHTML = `<i class="bi bi-exclamation-circle me-2"></i> ${data.acciones[0]}`;
                document.getElementById("accion2").innerHTML = `<i class="bi bi-robot me-2"></i> ${data.acciones[1]}`;
            }

            // Dibujar Gráfico con datos reales
            dibujarGrafico(data.proceso);
        }

        function dibujarGrafico(proceso) {
            const canvas = document.getElementById("graficoProceso");
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            if (graficoReferencia) { graficoReferencia.destroy(); }

            // Datos por defecto si el servidor manda ceros
            const screening = proceso.screening || 0;
            const entrevistas = proceso.entrevistas || 0;
            const oferta = proceso.oferta || 0;
            const contratados = proceso.contratados || 0;

            graficoReferencia = new Chart(ctx, {
                type: "doughnut",
                data: {
                    labels: ["Screening", "Entrevistas", "Oferta", "Contratados"],
                    datasets: [{
                        data: [screening, entrevistas, oferta, contratados],
                        backgroundColor: ["#fbbf24", "#60a5fa", "#a78bfa", "#34d399"],
                        hoverOffset: 4,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { 
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                usePointStyle: true,
                                font: { size: 12 }
                            }
                        }
                    },
                    cutout: '75%'
                }
            });
        }

        function cerrarSesion() {
            localStorage.removeItem('token');
            window.location.href = "Login.html";
        }

        function marcarEnlaceActivo() {
            const links = document.querySelectorAll(".link-menu");
            const currentPath = window.location.pathname.split("/").pop();
            links.forEach(link => {
                const linkPath = link.getAttribute("href");
                if (linkPath === currentPath) {
                    link.classList.add("activo");
                }
            });
        }
    </script>
</body>

</html>
