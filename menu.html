<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú principal - MarkNica</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- CHART.JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="app.css">
</head>

<body class="pantalla-menu">

    <!-- ================= ENCABEZADO DINÁMICO ================= -->
    <header class="encabezado-menu">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <h4>
                    <i class="bi bi-cpu-fill me-2"></i>
                    <span id="nombreApp">Cargando...</span>
                </h4>
                <!-- Botón de Cerrar Sesión -->
                <button onclick="cerrarSesion()" class="btn btn-sm btn-outline-light border-0">
                    <i class="bi bi-box-arrow-right fs-4"></i>
                </button>
            </div>

            <div class="row mt-3 text-center">
                <div class="col-4">
                    <div class="estadistica">
                        <span id="datoCandidatos">--</span>
                        <br>
                        <small>Candidatos</small>
                    </div>
                </div>
                <div class="col-4">
                    <div class="estadistica">
                        <span id="datoEntrevistas">--</span>
                        <br>
                        <small>Entrevistas</small>
                    </div>
                </div>
                <div class="col-4">
                    <div class="estadistica">
                        <span id="datoMatch">--%</span>
                        <br>
                        <small>Match IA</small>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- ================= CONTENIDO PRINCIPAL ================= -->
    <main class="container mt-4 fade">
        <h5 id="tituloAcciones" class="fw-bold mb-3">Acciones inmediatas</h5>

        <!-- Contenedor de Alertas IA -->
        <div id="contenedor-acciones">
            <div id="accion1" class="tarjeta-accion prioridad-alta p-3 mb-3 shadow-sm">
                Sincronizando datos...
            </div>
            <div id="accion2" class="tarjeta-accion prioridad-media p-3 mb-3 shadow-sm">
                Verificando vacantes...
            </div>
        </div>

        <!-- ================= GRÁFICO REAL DE POSTGRESQL ================= -->
        <div class="card mt-4 border-0 shadow-sm" style="border-radius: 1.2rem;">
            <div class="card-body">
                <h5 class="fw-bold mb-3">Estado del proceso</h5>
                <div style="position: relative; height:250px;">
                    <canvas id="graficoProceso"></canvas>
                </div>
            </div>
        </div>
    </main>

    <!-- ================= BARRA DE NAVEGACIÓN ================= -->
    <nav class="barra-inferior-pro">
        <a href="menu.html" class="link-menu activo">
            <i class="bi bi-house-door-fill"></i>
            <span>Inicio</span>
        </a>
        <a href="vacantes.html" class="link-menu">
            <i class="bi bi-briefcase"></i>
            <span>Vacantes</span>
        </a>
        <a href="agenda.html" class="link-menu">
            <i class="bi bi-calendar-event"></i>
            <span>Agenda</span>
        </a>
        <a href="perfil.html" class="link-menu">
            <i class="bi bi-person-circle"></i>
            <span>Perfil</span>
        </a>
    </nav>

    <!-- ================= LÓGICA DE CONEXIÓN AL BACKEND ================= -->
    <script>
        const API_BASE_URL = "http://127.0.0.1:8000";
        const token = localStorage.getItem('token');
        let graficoReferencia = null;

        // 1. Proteger la ruta: Si no hay token, fuera.
        if (!token) {
            window.location.href = "Login.html";
        }

        // 2. Al cargar la página, pedir datos al servidor
        document.addEventListener('DOMContentLoaded', () => {
            obtenerDatosDashboard();
            marcarEnlaceActivo();
        });

        async function obtenerDatosDashboard() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/dashboard-stats`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.status === 401) {
                    cerrarSesion();
                    return;
                }

                const data = await response.json();
                renderizarPantalla(data);

            } catch (error) {
                console.error("Error:", error);
                document.getElementById("nombreApp").textContent = "Sin Conexión";
            }
        }

        function renderizarPantalla(data) {
            // Actualizar Textos
            document.getElementById("nombreApp").textContent = data.appNombre;
            document.getElementById("datoCandidatos").textContent = data.candidatos;
            document.getElementById("datoEntrevistas").textContent = data.entrevistas;
            document.getElementById("datoMatch").textContent = data.match + "%";

            // Actualizar Tarjetas de Acción
            document.getElementById("accion1").innerHTML = `<i class="bi bi-exclamation-circle me-2"></i> ${data.acciones[0]}`;
            document.getElementById("accion2").innerHTML = `<i class="bi bi-robot me-2"></i> ${data.acciones[1]}`;

            // Dibujar Gráfico con datos reales
            dibujarGrafico(data.proceso);
        }

        function dibujarGrafico(proceso) {
            const ctx = document.getElementById("graficoProceso").getContext('2d');
            
            if (graficoReferencia) { graficoReferencia.destroy(); }

            graficoReferencia = new Chart(ctx, {
                type: "doughnut",
                data: {
                    labels: ["Screening", "Entrevistas", "Oferta", "Contratados"],
                    datasets: [{
                        data: [
                            proceso.screening, 
                            proceso.entrevistas, 
                            proceso.oferta, 
                            proceso.contratados
                        ],
                        backgroundColor: ["#fbbf24", "#60a5fa", "#a78bfa", "#34d399"],
                        hoverOffset: 4,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    },
                    cutout: '75%'
                }
            });
        }

        function cerrarSesion() {
            localStorage.removeItem('token');
            window.location.href = "Login.html";
        }

        function marcarEnlaceActivo() {
            const links = document.querySelectorAll(".link-menu");
            links.forEach(link => {
                if (link.href === window.location.href) {
                    link.classList.add("activo");
                }
            });
        }
    </script>
</body>

</html>
