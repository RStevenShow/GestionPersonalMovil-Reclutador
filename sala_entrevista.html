<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrevista en Vivo - MarkNica AI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="app.css">
</head>
<body class="body-sala">

    <div class="video-container">
        <video id="remoteVideo" autoplay playsinline poster="https://via.placeholder.com/1080x1920?text=Conectando..."></video>
        
        <video id="localVideo" autoplay playsinline muted></video>

        <div class="controls-bar">
            <button class="btn-action" onclick="toggleMic()" id="btnMic">
                <i class="bi bi-mic-fill"></i>
            </button>
            
            <button class="btn-action btn-hangup" onclick="abrirCierre()">
                <i class="bi bi-telephone-x-fill"></i>
            </button>

            <button class="btn-action" onclick="toggleCam()" id="btnCam">
                <i class="bi bi-camera-video-fill"></i>
            </button>
        </div>
    </div>

    <div class="modal fade" id="modalCalificar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered px-4">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-body text-center p-4">
                    <h5 class="fw-bold mb-3 text-dark">Finalizar Entrevista</h5>
                    <p class="text-muted small">Califica el desempeño del candidato</p>
                    
                    <div class="score-display" id="scoreValue">80</div>
                    <input type="range" class="form-range custom-range mb-4" id="scoreInput" min="0" max="100" value="80" oninput="updateUI(this.value)">
                    
                    <div class="d-grid gap-2">
                        <button type="button" class="btn btn-primary btn-lg rounded-pill fw-bold" onclick="finalizarProceso()">Guardar y Salir</button>
                        <button type="button" class="btn btn-link text-muted" data-bs-dismiss="modal">Regresar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE_URL = "https://reclutamiento-backend.onrender.com";
        const token = localStorage.getItem('token');
        let localStream = null;
        let interviewId = null;

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            interviewId = params.get('id');
            if (!interviewId) {
                window.location.href = "agenda.html";
                return;
            }
            iniciarMedios();
        });

        async function iniciarMedios() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" },
                    audio: true
                });
                document.getElementById('localVideo').srcObject = localStream;
            } catch (err) {
                console.error("Acceso denegado:", err);
                alert("Se requieren permisos de cámara.");
            }
        }

        function toggleMic() {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            const btn = document.getElementById('btnMic');
            btn.classList.toggle('btn-off', !track.enabled);
            btn.innerHTML = track.enabled ? '<i class="bi bi-mic-fill"></i>' : '<i class="bi bi-mic-mute-fill"></i>';
        }

        function toggleCam() {
            const track = localStream.getVideoTracks()[0];
            track.enabled = !track.enabled;
            const btn = document.getElementById('btnCam');
            btn.classList.toggle('btn-off', !track.enabled);
            btn.innerHTML = track.enabled ? '<i class="bi bi-camera-video-fill"></i>' : '<i class="bi bi-camera-video-off-fill"></i>';
        }

        function abrirCierre() {
            const myModal = new bootstrap.Modal(document.getElementById('modalCalificar'));
            myModal.show();
        }

        function updateUI(val) {
            document.getElementById('scoreValue').innerText = val;
        }

        async function finalizarProceso() {
            const score = document.getElementById('scoreInput').value;
            try {
                const response = await fetch(`${API_BASE_URL}/api/interviews/${interviewId}/complete?calificacion=${score}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    localStream.getTracks().forEach(t => t.stop());
                    window.location.href = "agenda.html";
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }
    </script>
</body>
</html>
