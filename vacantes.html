<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacantes - MarkNica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="app.css">
</head>

<body class="pantalla-menu">
    <header class="encabezado-menu">
        <div class="container py-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h1 class="h4 fw-bold mb-0">Vacantes</h1>
                    <p class="small opacity-75 mb-0">Gestión de Posiciones</p>
                </div>
                <i class="bi bi-briefcase fs-2"></i>
            </div>

            <div class="row g-2">
                <div class="col-4">
                    <div class="estadistica">
                        <span id="stat-abiertas" class="h5 fw-bold d-block">0</span>
                        <small style="font-size: 0.7rem;">Abiertas</small>
                    </div>
                </div>
                <div class="col-4">
                    <div class="estadistica">
                        <span id="stat-candidatos" class="h5 fw-bold d-block">0</span>
                        <small style="font-size: 0.7rem;">Candidatos</small>
                    </div>
                </div>
                <div class="col-4">
                    <div class="estadistica">
                        <span id="stat-llenas" class="h5 fw-bold d-block">0/0</span>
                        <small style="font-size: 0.7rem;">Llenas</small>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container p-3 fade">
        <div class="input-group mb-4 shadow-sm border-0" style="border-radius: 0.8rem; overflow: hidden;">
            <span class="input-group-text bg-white border-0"><i class="bi bi-search text-muted"></i></span>
            <input type="text" class="form-control border-0" id="searchInput" placeholder="Buscar vacantes...">
        </div>

        <div id="vacantes-list" class="vstack gap-3">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="small text-muted mt-2">Sincronizando con el Servidor...</p>
            </div>
        </div>
    </main>

    <button class="btn-flotante-accion" data-bs-toggle="modal" data-bs-target="#modalNuevaVacante">
        <i class="bi bi-plus-lg"></i>
    </button>

    <nav class="barra-inferior-pro">
        <a href="menu.html" class="link-menu">
            <i class="bi bi-house"></i>
            <span>Inicio</span>
        </a>
        <a href="vacantes.html" class="link-menu activo">
            <i class="bi bi-briefcase"></i>
            <span>Vacantes</span>
        </a>
        <a href="agenda.html" class="link-menu">
            <i class="bi bi-calendar"></i>
            <span>Agenda</span>
        </a>
        <a href="perfil.html" class="link-menu">
            <i class="bi bi-person"></i>
            <span>Perfil</span>
        </a>
    </nav>

    <div class="modal fade" id="modalNuevaVacante" tabindex="-1">
        <div class="modal-dialog modal-dialog-bottom">
            <div class="modal-content modal-content-app">
                <div class="modal-header border-0">
                    <h5 class="fw-bold mb-0">Nueva Vacante</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" id="btn-cerrar-modal"></button>
                </div>
                <div class="modal-body">
                    <div id="alerta-error-vacante" class="alert alert-danger d-none p-2 small text-center mb-3">
                        <i class="bi bi-exclamation-circle"></i> <span id="mensaje-error-vacante"></span>
                    </div>

                    <form id="formVacante">
                        <div class="campo-app">
                            <label>Título del puesto *</label>
                            <input type="text" id="title" required placeholder="Ej: Backend Developer">
                        </div>

                        <div class="row g-2">
                            <div class="col-7">
                                <div class="campo-app">
                                    <label>Rango Salarial</label>
                                    <input type="text" id="salary_range" placeholder="Ej: $1500 - $2000">
                                </div>
                            </div>
                            <div class="col-5">
                                <div class="campo-app">
                                    <label>Exp. (Años)</label>
                                    <input type="number" id="experience_years" value="0" min="0">
                                </div>
                            </div>
                        </div>

                        <div class="campo-app">
                            <label>Descripción General *</label>
                            <textarea id="description" rows="3" required placeholder="Resumen de la vacante..."></textarea>
                        </div>

                        <div class="campo-app">
                            <label>Responsabilidades</label>
                            <textarea id="responsibilities" rows="2" placeholder="Tareas principales..."></textarea>
                        </div>

                        <div class="row g-2">
                            <div class="col-6">
                                <div class="campo-app">
                                    <label>Prioridad</label>
                                    <select id="priority">
                                        <option value="high">Alta</option>
                                        <option value="medium" selected>Media</option>
                                        <option value="low">Baja</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="campo-app">
                                    <label>Ubicación</label>
                                    <input type="text" id="location" placeholder="Ej: Managua">
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 pb-4">
                    <button type="button" onclick="crearVacante()" id="btn-crear-vacante" class="boton-primario d-flex align-items-center justify-content-center gap-2">
                        <span id="btn-v-texto">Crear y Analizar con IA</span>
                        <div id="btn-v-spinner" class="spinner-border spinner-border-sm d-none"></div>
                        <i id="btn-v-check" class="bi bi-check-circle-fill d-none"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="status-container" class="d-none">
        <div class="status-box">
            <div id="status-spinner" class="spinner-border text-primary"></div>
            <i id="status-check" class="bi bi-check-circle-fill text-success d-none fs-1"></i>
            <p id="status-texto" class="mt-2 mb-0 fw-bold">Procesando con IA...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="vacantes.js"></script>
</body>
</html>
